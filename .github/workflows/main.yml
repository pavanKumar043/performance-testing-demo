name: Performance Test
on: [push] # This triggers the test every time you push code to GitHub

jobs:
  jmeter-run:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get your code from the repository
      - uses: actions/checkout@v4

      # Step 2: Install Java (required for JMeter)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Download and unzip JMeter
      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      # Step 4: Run your JMeter script (non-GUI mode)
      - name: Run Performance Test
        run: |
          ./apache-jmeter-5.6.3/bin/jmeter -n -t test-plan.jmx -l results.jtl -e -o report/

      # Step 5: Save the results (artifacts) so you can download them later
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: |
            results.jtl
            report/
