name: Performance Test
on: [push]

jobs:
  jmeter-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run Performance Test
        run: |
          ./apache-jmeter-5.6.3/bin/jmeter -n -t test-plan.jmx -l results.jtl -e -o report/

      - name: Check Performance Thresholds
        run: |
          # Calculate Total Requests vs Errors
          # JMeter JTL files mark success as 'true' and failure as 'false'
          TOTAL=$(grep -c "," results.jtl || echo 0)
          ERRORS=$(grep -c "false" results.jtl || echo 0)
          
          if [ $TOTAL -gt 0 ]; then
            PERCENT=$((ERRORS * 100 / TOTAL))
            echo "Current Error rate is: $PERCENT%"
            
            if [ $PERCENT -ge 20 ]; then
              echo "Error rate exceeded 20%! Failing the build."
              exit 1
            fi
          else
            echo "No requests were recorded. Check your JMX file."
            exit 1
          fi

      - name: Upload Test Results
        if: always() # Uploads report even if the test fails
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: |
            results.jtl
            report/
