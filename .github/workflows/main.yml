name: Performance Test
on: [push]

jobs:
  jmeter-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run Performance Test
        run: |
          ./apache-jmeter-5.6.3/bin/jmeter -n -t test-plan.jmx -l results.jtl -e -o report/

      - name: Check Performance Thresholds
        run: |
          # Count total sampleResult tags (XML format)
          TOTAL=$(grep -c "sampleResult" results.jtl || echo 0)
          
          # Count only failures
          ERRORS=$(grep -c 's="false"' results.jtl || echo 0)
          
          # Calculate avg response time, default to 0 if no results found
          AVG_TIME=$(awk -F't="' '/sampleResult/ {split($2,a,"\""); sum+=a[1]; count++} END {if (count > 0) print int(sum/count); else print 0}' results.jtl)

          # Ensure TOTAL is treated as a number
          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$((ERRORS * 100 / TOTAL))
            
            echo "--- Performance Summary ---"
            echo "Total Requests: $TOTAL"
            echo "Error Rate: $PERCENT%"
            echo "Avg Response Time: ${AVG_TIME}ms"
            
            # Threshold Check: Error Rate >= 50%
            if [ "$PERCENT" -ge 50 ]; then
              echo "FAIL: Error rate $PERCENT% exceeds 50%!"
              exit 1
            fi

            # Threshold Check: Avg Time >= 2000ms
            if [ "$AVG_TIME" -ge 2000 ]; then
              echo "FAIL: Avg response time ${AVG_TIME}ms exceeds 2000ms!"
              exit 1
            fi
            
            echo "SUCCESS: Performance gates passed."
          else
            echo "FAIL: No 'sampleResult' tags found. Check your JMX execution log."
            exit 1
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: |
            results.jtl
            report/
