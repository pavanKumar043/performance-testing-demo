name: Performance Test
on: [push]

jobs:
  jmeter-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run Performance Test
        run: |
          # Keep format as CSV so report generation works
          ./apache-jmeter-5.6.3/bin/jmeter -n -t test-plan.jmx -l results.jtl -e -o report/

      - name: Check Performance Thresholds
        run: |
          # 1. Count Total Requests and Errors (CSV)
          TOTAL=$(grep -c '^[0-9]' results.jtl || echo 0)
          ERRORS=$(grep -c ',false,' results.jtl || echo 0)
          
          # 2. Calculate Avg Response Time
          # We use awk to sum the 2nd column ($2) and divide by the total count
          AVG_TIME=$(awk -F, 'NR > 1 {sum+=$2; count++} END {if (count > 0) print int(sum/count); else print 0}' results.jtl)

          # 3. Handle missing data
          if [ "$TOTAL" -eq 0 ]; then
            echo "FAIL: No results found in CSV. Check JMX execution."
            exit 1
          fi

          # 4. Calculate stats
          PERCENT=$((ERRORS * 100 / TOTAL))
          echo "Total Samples: $TOTAL"
          echo "Error Rate: $PERCENT%"
          echo "Avg Response Time: ${AVG_TIME}ms"
          
          # 5. Threshold Gates
          if [ "$PERCENT" -ge 20 ]; then
            echo "FAIL: Error rate $PERCENT% exceeds 20%!"
            exit 1
          fi
          
          if [ "$AVG_TIME" -gt 10 ]; then
            echo "FAIL: Avg response time ${AVG_TIME}ms exceeds 10ms threshold!"
            exit 1
          fi
          
          echo "SUCCESS: Quality gate passed."
          
      - name: Upload Test Results
        if: always() # Uploads report even if the test fails
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: |
            results.jtl
            report/
