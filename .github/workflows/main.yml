name: Performance Test
on: [push]

jobs:
  jmeter-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run Performance Test
        run: |
          ./apache-jmeter-5.6.3/bin/jmeter -n -t test-plan.jmx -l results.jtl -e -o report/

      - name: Check Performance Thresholds
        run: |
          # 1. Count occurrences of sample result headers/data
          # We use tr -d to strip all whitespace and ensure a clean integer
          TOTAL=$(grep -c "<httpSample" results.jtl | tr -d '[:space:]' || echo 0)
          ERRORS=$(grep -c 's="false"' results.jtl | tr -d '[:space:]' || echo 0)
          
          # 2. Check if variables are valid integers
          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
             echo "FAIL: No test samples found. Check if JMeter actually ran."
             exit 1
          fi
          
          # 3. Calculate percentage using clean variables
          PERCENT=$((ERRORS * 100 / TOTAL))
          echo "Total samples: $TOTAL"
          echo "Error rate: $PERCENT%"
          
          if [ "$PERCENT" -ge 20 ]; then
            echo "FAIL: Error rate $PERCENT% exceeds 20%!"
            exit 1
          fi

      - name: Upload Test Results
        if: always() # Uploads report even if the test fails
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: |
            results.jtl
            report/
