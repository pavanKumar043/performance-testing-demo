name: JMeter Performance Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: jmeter-performance
  cancel-in-progress: true

env:
  JMETER_VERSION: "5.6.3"
  MAX_ERROR_RATE: "20"
  MAX_AVG_RESPONSE: "100"

jobs:
  performance-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      ##############################################################
      # Cache JMeter
      ##############################################################
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: apache-jmeter-${{ env.JMETER_VERSION }}
          key: jmeter-${{ env.JMETER_VERSION }}

      ##############################################################
      # Download only if cache misses
      ##############################################################
      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz
          tar -xzf apache-jmeter-${JMETER_VERSION}.tgz

      ##############################################################
      # Verify installation
      ##############################################################
      - name: Verify JMeter
        run: |
          ./apache-jmeter-${JMETER_VERSION}/bin/jmeter --version

      ##############################################################
      # Execute Test Plan
      ##############################################################
      - name: Run Performance Test
        run: |
          rm -rf report

          ./apache-jmeter-${JMETER_VERSION}/bin/jmeter \
          -n \
          -t test-plan.jmx \
          -l results.jtl \
          -e \
          -o report

      ##############################################################
      # Performance Quality Gate
      ##############################################################
      - name: Validate Performance Thresholds
        run: |

          set -euo pipefail

          TOTAL=$(awk 'NR>1{count++} END{print count+0}' results.jtl)

          ERRORS=$(awk -F',' '
          NR>1 && $8=="false" {count++}
          END {print count+0}
          ' results.jtl)

          AVG_TIME=$(awk -F',' '
          NR>1 {
              sum += $2
              count++
          }
          END {
              if(count>0)
                  print int(sum/count)
              else
                  print 0
          }
          ' results.jtl)

          if [ "$TOTAL" -eq 0 ]; then
            echo "No samples found."
            exit 1
          fi

          ERROR_PERCENT=$((ERRORS * 100 / TOTAL))

          echo "--------------------------------"
          echo "Performance Summary"
          echo "--------------------------------"
          echo "Total Requests : $TOTAL"
          echo "Failed Requests: $ERRORS"
          echo "Error Rate     : ${ERROR_PERCENT}%"
          echo "Average Time   : ${AVG_TIME} ms"
          echo "--------------------------------"

          {
            echo "## Performance Test Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|------:|"
            echo "| Total Requests | $TOTAL |"
            echo "| Failed Requests | $ERRORS |"
            echo "| Error Rate | ${ERROR_PERCENT}% |"
            echo "| Average Response Time | ${AVG_TIME} ms |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$ERROR_PERCENT" -gt "$MAX_ERROR_RATE" ]; then
            echo "Performance Quality Gate Failed"
            echo "Error Rate exceeded ${MAX_ERROR_RATE}%"
            exit 1
          fi

          if [ "$AVG_TIME" -gt "$MAX_AVG_RESPONSE" ]; then
            echo "Performance Quality Gate Failed"
            echo "Average Response Time exceeded ${MAX_AVG_RESPONSE} ms"
            exit 1
          fi

          echo "Performance Quality Gate Passed"

      ##############################################################
      # Upload HTML Report
      ##############################################################
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: report/
          retention-days: 14

      ##############################################################
      # Upload JTL File
      ##############################################################
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: results.jtl
          retention-days: 14
